<!DOCTYPE html>
<html lang="ja">
<head>

    <title>グランドファイン豊中 - 客室案内</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- style.cssを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-white/85 p-8 rounded-3xl backdrop-blur-md shadow-2xl w-full max-w-3xl text-center">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- ランクS〜Fはそのまま -->
            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_s" class="bg-yellow-500 text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">S</a>
            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_a" class="bg-red-500 text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">A</a>

            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_c" class="bg-green-500 text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">C</a>
            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_d" class="bg-purple-500 text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">D</a>
            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_e" class="bg-gray-600 text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">E</a>
            <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/price/#r_f" class="bg-black text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition-all">F</a>

    </div>

    <!-- App.jsを読み込む -->
    <script src="App.js"></script>

</html>
