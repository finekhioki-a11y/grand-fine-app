<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>グランドファイン豊中</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="bg-white/85 p-6 rounded-3xl shadow-2xl w-full max-w-lg mx-auto text-center">
    <!-- ロゴ -->
    <img src="gftoyonaka_w.jpg" alt="グランドファイン豊中" class="mx-auto h-12 mb-4">
    
    <!-- 空室表示エリア -->
    <div id="status-display" class="mb-6 p-4 bg-amber-50 rounded-xl font-bold text-amber-900 border border-amber-200">
      最新情報を確認中...
    </div>

    <h1 class="text-lg font-bold text-gray-800 mb-4">メニューを選択</h1>
    <div class="grid grid-cols-2 gap-4">
      <!-- 公式HP -->
      <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-4xl mb-2">🏠</div>
        <div class="font-bold text-gray-700">公式HP</div>
      </a>
      <!-- お部屋・設備案内 -->
      <a href="rooms.html" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-4xl mb-2">🛋️</div>
        <div class="font-bold text-gray-700">お部屋・設備案内</div>
      </a>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://divine-wave-9d51.fine-k-hioki.workers.dev/';

    fetch(WORKER_URL)
      .then(res => res.json())
      .then(data => {
        if (data.empty && data.empty !== "確認中") {
          document.getElementById('status-display').innerHTML = 
            '空室: <span class="text-2xl">' + data.empty + '</span>室 / ' +
            '準備中: <span class="text-2xl">' + data.ready + '</span>室';
        } else {
          document.getElementById('status-display').style.display = 'none';
        }
      })
      .catch(() => {
        document.getElementById('status-display').style.display = 'none';
      });
  </script>
</body>
</html>
