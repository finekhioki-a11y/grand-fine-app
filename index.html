<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7c330e">
  <title>グランドファイン豊中</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f5f1ed; color: #35291f; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; }
    .app { width: min(100%, 520px); min-height: 100vh; margin: auto; padding: 24px 18px; background: rgba(255,255,255,.9); }
    .logo { display: block; width: auto; max-width: 75%; height: 76px; object-fit: contain; margin: 0 auto 32px; }
    .card { padding: 28px 20px; border-radius: 28px; background: #fff; box-shadow: 0 14px 36px rgba(75,45,21,.14); }
    h1, h2, h3, p { margin-top: 0; } h1 { margin-bottom: 24px; font-size: 23px; } h2 { margin-bottom: 20px; font-size: 21px; color: #7c330e; } h3 { margin-bottom: 12px; font-size: 15px; }
    .home-links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; border-top: 1px solid #e7ddd3; padding-top: 22px; }
    .home-link, .menu-button { display: flex; min-height: 112px; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border: 0; border-radius: 16px; background: #fff9f3; color: #35291f; font: inherit; font-weight: 700; text-decoration: none; cursor: pointer; }
    .home-link:active, .menu-button:active, .rank-button:active, .room-link:active { transform: scale(.98); }
    .home-icon { font-size: 39px; } .back { margin-bottom: 20px; padding: 8px 12px; border: 1px solid #cfc2b6; border-radius: 8px; background: #fff; color: #5f5146; font-weight: 700; cursor: pointer; }
    .rank-grid, .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
    .rank-button, .room-link { padding: 13px 5px; border: 0; border-radius: 9px; background: #7c330e; color: #fff; font: inherit; font-weight: 700; text-align: center; text-decoration: none; cursor: pointer; }
    .rank-button.active { outline: 3px solid #efbd51; }
    .details { margin-top: 24px; padding-top: 22px; border-top: 1px solid #e7ddd3; }
    .detail-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; } .detail-head h2 { margin: 0; }
    .count { border-radius: 999px; padding: 5px 10px; background: #f9e6b9; color: #7c330e; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .description { margin: 16px 0 18px; color: #68594d; line-height: 1.7; }
    .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .feature { display: flex; min-height: 88px; flex-direction: column; align-items: center; justify-content: center; gap: 7px; border-radius: 12px; background: #faf7f4; text-align: center; }
    .material-symbols-outlined { color: #7c330e; font-size: 31px; } .feature span:last-child { font-size: 12px; font-weight: 700; }
    .note { margin: 12px 0 0; color: #796c62; font-size: 12px; line-height: 1.6; }
    [hidden] { display: none !important; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <img src="gftoyonaka_w.jpg" alt="グランドファイン豊中" class="logo">
    <section id="home" class="card">
      <h1>メニューを選択</h1>
      <div class="home-links">
        <a class="home-link" href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/"><span class="home-icon">🏨</span>公式HP</a>
        <button class="menu-button" id="open-guide" type="button"><span class="home-icon">🛋️</span>お部屋・設備案内</button>
      </div>
    </section>
    <section id="guide" class="card" hidden>
      <button id="back" class="back" type="button">← メニュー</button>
      <h1>お部屋タイプを選択</h1>
      <div id="ranks" class="rank-grid"></div>
      <div id="details" class="details" hidden>
        <div class="detail-head"><h2 id="type-name"></h2><span id="room-count" class="count"></span></div>
        <p id="description" class="description"></p>
        <div id="features" class="feature-grid"></div>
        <h3>部屋番号を選択</h3>
        <div id="rooms" class="room-grid"></div>
        <p id="note" class="note"></p>
      </div>
    </section>
  </main>
  <script>
    const types = {
      S: { rooms:['602'], text:'最上階・広いお部屋', features:[['apartment','最上階'],['king_bed','部屋広い'],['hot_tub','円形ジャグジー'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','65インチ'],['speaker','音響良い']] },
      A: { rooms:['302','307','407','501','502','503','603'], text:'広めのお部屋・ユニットバス', features:[['king_bed','部屋広め'],['bathtub','ユニットバス'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','50インチ以上']], note:'※307号室にはマッサージチェアがありません。' },
      B: { rooms:['506'], text:'広めのお部屋・ビリヤード付き', features:[['king_bed','部屋広め'],['sports_score','ビリヤード'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','60インチ']] },
      C: { rooms:['311','412','601'], text:'広めのお部屋', features:[['king_bed','部屋広め'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','50インチ']] },
      D: { rooms:['203','205','206','211','301','303','306','401','403','405','408','507'], text:'広めのお部屋', features:[['king_bed','部屋広め'],['chair','マッサージチェア'],['tv','40インチ以上']] },
      E: { rooms:['201','202','207','305','406','511'], text:'広めのお部屋', features:[['king_bed','部屋広め'],['tv','40インチ以上']] },
      F: { rooms:['208','210','308','310','410','411','508','510'], text:'コンパクトなお部屋', features:[['single_bed','部屋狭め'],['tv','40インチ']] },
      G: { rooms:['505'], text:'505号室', features:[], note:'設備情報は準備中です。' }
    };
    const ranks = document.getElementById('ranks');
    Object.keys(types).forEach(rank => {
      const button = document.createElement('button'); button.className = 'rank-button'; button.textContent = rank; button.type = 'button';
      button.addEventListener('click', () => showType(rank)); ranks.appendChild(button);
    });
    function showType(rank) {
      const type = types[rank]; document.getElementById('details').hidden = false;
      document.getElementById('type-name').textContent = rank + 'タイプ'; document.getElementById('room-count').textContent = type.rooms.length + '室';
      document.getElementById('description').textContent = type.text;
      document.getElementById('features').innerHTML = type.features.length ? type.features.map(([icon,label]) => `<div class="feature"><span class="material-symbols-outlined">${icon}</span><span>${label}</span></div>`).join('') : '<p class="note">設備情報は準備中です。</p>';
      document.getElementById('rooms').innerHTML = type.rooms.map(room => `<a class="room-link" href="https://happyhotel.jp/hotels/610527/rooms/${room}">${room}</a>`).join('');
      document.getElementById('note').textContent = type.note || '';
      document.querySelectorAll('.rank-button').forEach(button => button.classList.toggle('active', button.textContent === rank));
    }
    document.getElementById('open-guide').addEventListener('click', () => { document.getElementById('home').hidden = true; document.getElementById('guide').hidden = false; });
    document.getElementById('back').addEventListener('click', () => { document.getElementById('guide').hidden = true; document.getElementById('home').hidden = false; });
  </script>
  <div class="bg-white/85 p-6 rounded-3xl backdrop-blur-md shadow-2xl w-full max-w-lg text-center">
    <img src="gftoyonaka_w.jpg" alt="グランドファイン豊中" class="mx-auto h-12 mb-6">

    <h1 class="text-xl font-bold text-gray-800 mb-8">お部屋タイプを選択</h1>

    <div class="grid grid-cols-2 gap-4 border-t pt-4">
      <a href="https://www.hotel-fine.co.jp/hotel/gf-toyonakaminami/" class="flex flex-col items-center hover:opacity-70 transition-all">
        <span class="text-3xl mb-1">🏨</span>
        <span class="text-xs font-bold text-gray-700">公式HP</span>
      </a>
      <a href="rooms.html" class="flex flex-col items-center hover:opacity-70 transition-all">
        <span class="text-3xl mb-1">🛋️</span>
