<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お部屋タイプを選択 - グランドファイン豊中</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="bg-white/85 p-6 rounded-3xl shadow-2xl w-full max-w-lg mx-auto text-center relative">
    
    <!-- 左上の「メニュー」リンク -->
    <a href="index.html" class="absolute left-6 top-6 text-gray-700 font-bold hover:text-gray-900 transition flex items-center">
      <span class="text-xl mr-1">←</span>メニュー
    </a>

    <!-- 右上にあった「空き室: undefined室」の表示エリアは完全に削除しました -->

    <!-- ロゴ -->
    <img src="gftoyonaka_w.jpg" alt="グランドファイン豊中" class="mx-auto h-12 mb-6 mt-12">
    
    <h1 class="text-xl font-bold text-gray-800 mb-6">お部屋タイプを選択</h1>
    
    <!-- タイプ選択ボタン -->
    <div class="grid grid-cols-4 gap-2 mb-8">
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">S</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">A</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">B</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">C</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">D</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">E</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">F</div>
      <div class="bg-amber-900 text-white py-3 rounded-lg font-bold">G</div>
    </div>
    
    <div class="border-t border-gray-200 my-8"></div>

    <!-- Eタイプの詳細（例） -->
    <div class="text-left bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold text-gray-800">Eタイプ</h2>
        <span class="bg-amber-50 text-amber-900 px-3 py-1 rounded-full text-sm font-bold">6室</span>
      </div>
      <p class="text-gray-600 mb-6">広めのお部屋で、ゆったりとお過ごしいただけます。</p>
      
      <div class="flex items-center gap-6 mb-6 text-gray-700">
        <div class="flex items-center"><span class="text-3xl mr-2">🛏️</span> 部屋広め</div>
        <div class="flex items-center"><span class="text-3xl mr-2">📺</span> 40インチ以上</div>
      </div>
      
      <p class="font-bold text-gray-700 mb-3">お部屋番号:</p>
      <div class="flex flex-wrap gap-2">
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">201</div>
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">202</div>
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">207</div>
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">305</div>
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">406</div>
        <div class="bg-amber-900 text-white px-4 py-2 rounded-lg font-bold">511</div>
      </div>
    </div>

    <!-- ここにあった「scriptタグ」は完全に削除しました -->
  </div>
</body>
</html>
