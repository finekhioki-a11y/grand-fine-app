<script>
  // 1. ローカルストレージから保存データを読み込む
  let statusData = JSON.parse(localStorage.getItem('roomStatus')) || {};

  const types = {
    S:{rooms:['602'],summary:'最上階・広いお部屋',features:[['apartment','最上階'],['king_bed','部屋広い'],['hot_tub','円形ジャグジー'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','65インチ'],['speaker','音響良い']]},
    A:{rooms:['302','307','407','501','502','503','603'],summary:'広めのお部屋・ユニットバス',features:[['king_bed','部屋広め'],['bathtub','ユニットバス'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','50インチ以上']],note:'※307号室にはマッサージチェアがありません。'},
    B:{rooms:['506'],summary:'広めのお部屋・ビリヤード付き',features:[['king_bed','部屋広め'],['sports_score','ビリヤード'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','60インチ']]},
    C:{rooms:['311','412','601'],summary:'広めのお部屋',features:[['king_bed','部屋広め'],['shower','ミラブル'],['chair','マッサージチェア'],['tv','50インチ']]},
    D:{rooms:['203','205','206','211','301','303','306','401','403','405','408','507'],summary:'広めのお部屋',features:[['king_bed','部屋広め'],['chair','マッサージチェア'],['tv','40インチ以上']]},
    E:{rooms:['201','202','207','305','406','511'],summary:'広めのお部屋',features:[['king_bed','部屋広め'],['tv','40インチ以上']]},
    F:{rooms:['208','210','308','310','410','411','508','510'],summary:'コンパクトなお部屋',features:[['single_bed','部屋狭め'],['tv','40インチ']]},
    G:{rooms:['505'],summary:'505号室',features:[],note:'設備情報は準備中です。'}
  };

  const ranks = document.getElementById('ranks');
  Object.keys(types).forEach(rank => {
    const button = document.createElement('button');
    button.type = 'button'; button.textContent = rank;
    button.className = 'bg-amber-900 text-white p-2 rounded-lg text-xs font-bold';
    button.onclick = () => showType(rank); ranks.appendChild(button);
  });

  function showType(rank) {
    const type = types[rank]; 
    document.getElementById('details').classList.remove('hidden');
    document.getElementById('title').textContent = rank + 'タイプ';
    document.getElementById('count').textContent = type.rooms.length + '室';
    document.getElementById('summary').textContent = type.summary;
    document.getElementById('features').innerHTML = type.features.map(([icon,label]) => `<div class="rounded-xl bg-stone-50 p-3"><span class="material-symbols-outlined text-3xl text-amber-900">${icon}</span><div class="mt-1 text-xs font-bold text-gray-700">${label}</div></div>`).join('') || '<p class="col-span-3 text-sm text-gray-500">設備情報は準備中です。</p>';
    
    // 部屋ボタンの生成
    renderRooms(type.rooms);
  }

  function renderRooms(roomList) {
    const container = document.getElementById('rooms');
    container.innerHTML = '';
    roomList.forEach(room => {
      const isOccupied = statusData[room];
      const btn = document.createElement('button');
      btn.className = `${isOccupied ? 'bg-gray-400' : 'bg-amber-900'} text-white p-3 rounded-lg text-center text-sm font-bold`;
      btn.innerHTML = `${room} ${isOccupied ? '/ 在室' : ''}`;
      
      // 長押しで切り替え
      btn.oncontextmenu = (e) => {
        e.preventDefault();
        statusData[room] = !statusData[room];
        localStorage.setItem('roomStatus', JSON.stringify(statusData));
        // 再描画
        showType(document.getElementById('title').textContent.replace('タイプ', ''));
      };
      container.appendChild(btn);
    });
  }
</script>
